---
layout: default
title: Lab
name: lab
---

<h1 class="post__title">Lab</h1>

<div class="container container--small">
  <a
    href="/app-store/"
    style="
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      margin-bottom: 22px;
      border-radius: 16px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(135deg, #ff6b35, #a855f7 60%, #2d7ff9);
      box-shadow: 0 10px 30px rgba(120, 80, 200, 0.35);
    "
  >
    <span style="font-size: 26px; line-height: 1"></span>
    <span style="flex: 1">
      <strong style="display: block; font-size: 17px">My Mac apps, App Store style</strong>
      <span style="opacity: 0.9; font-size: 13px">Browse my Mac apps in a little App Store →</span>
    </span>
  </a>
</div>

<div class="container container--small">
  {% for project in projects %}

  <article
    class="list-item list-item--lab {% if project.image %}list-item--with-picture{% endif %}"
  >
    <span class="list-item__number">{{ forloop.i | plus:1 }}</span>

    <div class="list-item__content">
      <a href="{{ project.link }}" style="display: block">
        <h3 class="post-title">{{ project.name }}</h3>
      </a>
      <span class="list-item--lab__desc">{{ project.desc }}</span>
    </div>

    {% if project.image %}
    <div class="list-item__image">
      <img src="{{ project.image }}" />
    </div>
    {% endif %}
  </article>

  {% endfor %}
</div>
